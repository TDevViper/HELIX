name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check helix/ --select E,W,F,I --ignore E501

      - name: Tests
        run: pytest helix/tests/ -q --tb=short

      - name: No blocking calls
        run: |
          grep -rn "time\.sleep\|requests\.get\|requests\.post" helix/ && exit 1 || exit 0

      - name: No global state
        run: |
          grep -rn "^global " helix/ && exit 1 || exit 0
