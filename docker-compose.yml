version: "3.9"

services:

  redis:
    image: redis:7.2-alpine
    container_name: helix-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: helix-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  helix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helix-gateway
    ports:
      - "8000:8000"
    environment:
      HELIX_REDIS_URL: redis://redis:6379/0
      HELIX_BOOTSTRAP_WORKERS: http://ollama:11434
      HELIX_LOG_LEVEL: INFO
      HELIX_DEBUG: "false"
      HELIX_AUTH_ENABLED: "false"
      HELIX_OTEL_ENABLED: "false"
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis_data:
  ollama_data:
