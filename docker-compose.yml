version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  helix:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HELIX_REDIS_URL=redis://redis:6379/0
      - HELIX_BOOTSTRAP_WORKERS=http://ollama-stub:11434
      - HELIX_AUTH_ENABLED=false
      - HELIX_LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ollama-stub:
    image: mendhak/http-https-echo:latest
    ports:
      - "11434:8080"
    environment:
      - HTTP_PORT=8080
